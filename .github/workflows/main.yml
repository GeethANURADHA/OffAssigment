name: Node.js CI/CD to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Install Node.js dependencies using npm ci (Setup)
      - name: Install Dependencies
        run: npm ci

      # 4. Run the existing test script in package.json (Testing)
      - name: Run Tests
        run: npm test

      # 5. Authenticate to Docker Hub using GitHub Secrets (Push)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Set up Docker Buildx (Required for build-push-action v5)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build a Docker image using the existing Dockerfile and Push (Dockerization & Push)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-manager:latest
