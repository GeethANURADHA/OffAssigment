version: '3.8'

services:
  # MongoDB service
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Node.js app service
  app:
    image: geethanu1999/task-manager:latest
    container_name: task-manager-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/task-manager
    depends_on:
      - mongo

volumes:
  mongo-data:
